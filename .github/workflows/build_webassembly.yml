name: Build Project - WebAssembly

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build_webassembly.yml'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write       # Required for actions/upload-release-asset to upload release asset
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: ${{ github.event.repository.name }}
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_wasm
      # CMake project/target name, fixed in CMakeLists.txt
      CMAKE_TARGET_NAME: raylib-game-template

    steps:
    - name: Checkout this repo
      uses: actions/checkout@master

    - name: Setup emsdk
      uses: emscripten-core/setup-emsdk@v15
      with:
        version: 5.0.3
        actions-cache-folder: 'emsdk-cache'

    - name: Setup Release Paths
      run: |
        echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_wasm" >> $GITHUB_ENV
      shell: bash
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Build Product
      run: |
        emcmake cmake -B build-web -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release
        cmake --build build-web

    - name: Generate Artifacts
      run: |
        mkdir -p ${{ env.PROJECT_RELEASE_PATH }}
        cp build-web/${{ env.CMAKE_TARGET_NAME }}/${{ env.CMAKE_TARGET_NAME }}.html ${{ env.PROJECT_RELEASE_PATH }}/index.html
        cp build-web/${{ env.CMAKE_TARGET_NAME }}/${{ env.CMAKE_TARGET_NAME }}.js   ${{ env.PROJECT_RELEASE_PATH }}/
        cp build-web/${{ env.CMAKE_TARGET_NAME }}/${{ env.CMAKE_TARGET_NAME }}.wasm ${{ env.PROJECT_RELEASE_PATH }}/
        cp build-web/${{ env.CMAKE_TARGET_NAME }}/${{ env.CMAKE_TARGET_NAME }}.data ${{ env.PROJECT_RELEASE_PATH }}/
        cp README.md LICENSE ${{ env.PROJECT_RELEASE_PATH }}/
        ls ${{ env.PROJECT_RELEASE_PATH }}
        7z a ./${{ env.PROJECT_RELEASE_PATH }}.zip ./${{ env.PROJECT_RELEASE_PATH }}
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_RELEASE_PATH }}.zip
        path: |
            ./${{ env.PROJECT_RELEASE_PATH }}
            !./${{ env.PROJECT_RELEASE_PATH }}.zip

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./${{ env.PROJECT_RELEASE_PATH }}

    - name: Upload Artifact to Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ env.PROJECT_RELEASE_PATH }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
